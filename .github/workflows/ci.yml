name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build component library
        run: npm run build:lib

      - name: Verify i18n message files
        run: npm run verify:i18n

      - name: Verify component quality
        run: npm run verify:components

      - name: Build documentation site
        run: npm run build
